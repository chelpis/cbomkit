services:
  backend:
    image: cbomkit:local-dev
    # depends_on:
    #   - db
    env_file:
      - .env
    environment:
      CBOMKIT_DB_TYPE: postgresql
      # 連接 host 機器上的 PostgreSQL (不使用 container)
      # 格式: jdbc:postgresql://<host>:<port>/<database>
      CBOMKIT_DB_JDBC_URL: jdbc:postgresql://host.docker.internal:5432/${POSTGRESQL_DB:-cbomkit}
      CBOMKIT_PORT: 8081
      CBOMKIT_DB_USERNAME: ${POSTGRESQL_AUTH_USERNAME}
      CBOMKIT_DB_PASSWORD: ${POSTGRESQL_AUTH_PASSWORD}
      CBOMKIT_FRONTEND_URL_CORS: "*"
      # ZIP 上傳大小限制 (增加到 500MB)a
      QUARKUS_HTTP_LIMITS_MAX_BODY_SIZE: 500M
      QUARKUS_HTTP_LIMITS_MAX_FORM_ATTRIBUTE_SIZE: 500M
      # Folder scanning path (for UUID-based folder scanning)
      CBOMKIT_SCAN_FOLDER_PATH: /home/jboss/scans
      # JVM 記憶體設定 (調整為符合 Docker 11.68GB 限制)
      JAVA_OPTS: "-Dquarkus.http.host=0.0.0.0 -Djava.util.logging.manager=org.jboss.logmanager.LogManager -Xmx8g -Xms6g -XX:+UseG1GC"
    #      CBOMKIT_REGULATOR_API_BASE: "http://regulator:8080"
    #      CBOMKIT_QS_EXPLORER_API_BASE: "http://localhost:8000/api/v1/scan"
    ports:
      - "8081:8081"
    volumes:
      - cbomkit-volume:/home/user/.cbomkit
      - ./scans:/home/jboss/scans # Mount local scans folder for UUID-based scanning
    restart: always
    deploy:
      resources:
        reservations:
          memory: 8g
        limits:
          memory: 10g
    profiles:
      - prod
      - ext-compliance
      - dev-frontend
    # Linux 需要這個來讓 container 連到 host
    extra_hosts:
      - "host.docker.internal:host-gateway"
  frontend:
    image: ghcr.io/cbomkit/cbomkit-frontend:${CBOMKIT_VERSION}
    environment:
      VUE_APP_HTTP_API_BASE: "http://192.168.16.12:8001"
      VUE_APP_WS_API_BASE: "ws://192.168.16.12:8001"
      VUE_APP_TITLE: "CBOMkit"
      VUE_APP_VIEWER_ONLY: ${CBOMKIT_VIEWER}
    ports:
      - "8001:8000"
    volumes:
      - ./frontend/docker/etc/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: always
    profiles:
      - prod
      - ext-compliance
      - dev-backend
      - viewer
  db:
    image: docker.io/library/postgres:16-alpine
    user: postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: ${POSTGRESQL_AUTH_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRESQL_AUTH_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready -U ${POSTGRESQL_AUTH_USERNAME} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - "pg-volume:/var/lib/postgresql/data/"
    restart: always
    profiles:
      # 移除 prod，使用外部 PostgreSQL 時不需要這個 container
      # - prod
      - ext-compliance
      - dev
      - dev-backend
      - dev-frontend
      - standalone # 需要獨立 DB 時使用
  regulator:
    image: ibm-regulator
    environment:
      OPA_BASE_URL: "http://opa:8181"
    ports:
      - "8080:8080"
    profiles:
      - ext-compliance
  opa:
    image: docker.io/openpolicyagent/opa:0.66.0
    command:
      - "run"
      - "--addr=0.0.0.0:8181"
      - "--server"
    ports:
      - "8181:8181"
    profiles:
      - ext-compliance
volumes:
  cbomkit-volume:
  pg-volume:
